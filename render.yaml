services:
  - type: web
    name: verity-iq-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: GOOGLE_API_KEY
        sync: false # You will enter your Gemini API key in the Render dashboard
      - key: FRONTEND_URL
        value: https://verity-iq.vercel.app
